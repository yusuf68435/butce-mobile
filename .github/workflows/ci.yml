name: CI

# Assumes butce-mobile/ is the repo root.
# If the parent folder is the repo root, add `working-directory: butce-mobile`
# to each step that runs npm/node and adjust the cache path.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint --silent
        continue-on-error: true

      - name: Unit tests
        run: npm test -- --runInBand --colors

      - name: Smoke check — core packages resolve
        run: |
          node -e "require.resolve('expo'); require.resolve('react-native'); console.log('ok')"
